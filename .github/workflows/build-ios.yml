name: Build iOS (gratuit, sans Mac)

# Construit l'app iOS FLEX sur un runner macOS GitHub (GRATUIT — tu n'as PAS
# besoin de Mac). ⚠️ Cette build de VÉRIFICATION (simulateur, NON signée) prouve
# que l'app compile pour iPhone. Pour l'INSTALLER sur un vrai iPhone ou l'App
# Store, il faut un compte Apple Developer (99 $/an) + signature (voir ios/README).

on:
  workflow_dispatch: {}

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Construire l'app web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DEMO_MODE: 'false'
          VITE_ADMIN_USERNAME: ${{ secrets.VITE_ADMIN_USERNAME }}

      - name: Générer / synchroniser le projet iOS
        run: |
          if [ ! -d ios ]; then npx cap add ios; fi
          npx cap sync ios

      - name: Compiler (simulateur, non signé — vérifie que ça marche)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Debug -sdk iphonesimulator \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build

      - name: Publier le build comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: flex-ios-build
          path: ios/App/build/Build/Products
          if-no-files-found: warn

# ── INSTALLER SUR UN VRAI IPHONE / APP STORE (nécessite Apple Developer) ────
# 1) Compte Apple Developer (99 $/an).
# 2) Certificat + provisioning profile → en Secrets GitHub.
# 3) Remplacer l'étape de compilation par `xcodebuild archive` + `exportArchive`
#    avec la signature (action apple-actions/import-codesign-certs).
# Chemin 100% gratuit en attendant : la PWA « Ajouter à l'écran d'accueil ».
