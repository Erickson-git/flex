name: Build Android APK (gratuit)

# Construit un APK FLEX installable, GRATUITEMENT, sur les serveurs GitHub
# (runner Ubuntu = aucun Mac/PC puissant requis). Lancement manuel ou sur tag.

on:
  workflow_dispatch: {} # bouton "Run workflow" dans l'onglet Actions
  push:
    tags: ['v*'] # pousse un tag v1.0.0 → build + Release publiée automatiquement

permissions:
  contents: write # nécessaire pour créer la Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer les dépendances
        run: npm ci

      - name: Construire l'app web
        run: npm run build
        env:
          # Les vraies valeurs sont à mettre dans Settings → Secrets → Actions
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DEMO_MODE: 'false'
          VITE_ADMIN_USERNAME: ${{ secrets.VITE_ADMIN_USERNAME }}

      - name: Générer / synchroniser le projet Android
        run: |
          if [ ! -d android ]; then npx cap add android; fi
          npx cap sync android

      - name: Construire l'APK (debug, installable)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Renommer l'APK (nom stable pour le bouton de téléchargement)
        run: cp android/app/build/outputs/apk/debug/app-debug.apk flex.apk

      - name: Publier l'APK comme artefact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: flex-android-apk
          path: flex.apk
          if-no-files-found: error

      # Sur un tag (ex. v1.0.0) : crée/maj la Release et y attache flex.apk
      # → l'app le télécharge via .../releases/latest/download/flex.apk
      - name: Publier la Release GitHub avec l'APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: flex.apk
          name: FLEX ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: 'APK Android installable de FLEX. (Build debug — pour le Play Store, voir build-android-release.)'

# ── APK SIGNÉ POUR LE PLAY STORE (plus tard) ───────────────────────────────
# Pour publier sur le Play Store il faut un APK/AAB SIGNÉ. Ajoute un keystore :
#   1) keytool -genkey -v -keystore flex.keystore -alias flex -keyalg RSA -keysize 2048 -validity 10000
#   2) Mets le keystore (base64) + mots de passe dans les Secrets GitHub.
#   3) Remplace `assembleDebug` par `bundleRelease` + signe (action r0adkll/sign-android-release).
